document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"position:sticky;top:0;z-index:50;background:#23201B;color:#FAF8F3;display:flex;align-items:center;gap:6px;padding:8px 14px;flex-wrap:wrap;font-size:13px;\">\n    <span style=\"font-family:Spectral,serif;font-weight:600;font-size:15px;letter-spacing:-0.01em;margin-right:8px;\">WorkAble · Redesign preview<\u002Fspan>\n    <button onclick=\"{{ goLanding }}\" style=\"{{ tab.landing }}\">Landing<\u002Fbutton>\n    <button onclick=\"{{ goLogin }}\" style=\"{{ tab.login }}\">Sign in<\u002Fbutton>\n    <button onclick=\"{{ goRegister }}\" style=\"{{ tab.register }}\">Register<\u002Fbutton>\n    <button onclick=\"{{ goSchool }}\" style=\"{{ tab.school }}\">School<\u002Fbutton>\n    <button onclick=\"{{ goRecruiter }}\" style=\"{{ tab.recruiter }}\">Recruiter<\u002Fbutton>\n    <button onclick=\"{{ goJob }}\" style=\"{{ tab.job }}\">Post job<\u002Fbutton>\n    <button onclick=\"{{ goAdmin }}\" style=\"{{ tab.admin }}\">Admin<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;background:#FAF8F3;\">\n\n  <!-- ============ LANDING ============ -->\n  <sc-if value=\"{{ isLanding }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"Landing\">\n    <header style=\"max-width:1120px;margin:0 auto;padding:26px 32px;display:flex;align-items:center;\">\n      <span style=\"display:inline-flex;align-items:center;gap:11px;\">\n        <svg width=\"34\" height=\"34\" viewBox=\"0 0 32 32\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M5.5 27 H26.5\" stroke=\"#3F6E4B\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M8 27 V16 a8 8 0 0 1 16 0 V27\" stroke=\"#3F6E4B\" stroke-width=\"2.4\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n          <path d=\"M16 9.5 C16.4 13.2 16.8 13.6 20.6 14 C16.8 14.4 16.4 14.8 16 18.6 C15.6 14.8 15.2 14.4 11.4 14 C15.2 13.6 15.6 13.2 16 9.5 Z\" fill=\"#BC6A43\"><\u002Fpath>\n        <\u002Fsvg>\n        <span style=\"font-family:Spectral,serif;font-weight:600;font-size:23px;letter-spacing:-0.01em;color:#23201B;\">Work<span style=\"color:#3F6E4B;\">Able<\u002Fspan><\u002Fspan>\n      <\u002Fspan>\n      <nav style=\"margin-left:auto;display:flex;align-items:center;gap:8px;\">\n        <button onclick=\"{{ goLogin }}\" style=\"background:none;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:#6E685C;padding:10px 14px;border-radius:10px;\">Log in<\u002Fbutton>\n        <button onclick=\"{{ goRegister }}\" style=\"cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:#fff;background:#3F6E4B;border:1px solid #345C3F;padding:11px 20px;border-radius:11px;\" style-hover=\"background:#345C3F;\">Get started<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fheader>\n\n    <section style=\"max-width:1120px;margin:0 auto;padding:40px 32px 24px;display:grid;grid-template-columns:1.15fr 0.85fr;gap:56px;align-items:center;\">\n      <div>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#BC6A43;\">\n          <span style=\"width:18px;height:1px;background:#BC6A43;display:inline-block;\"><\u002Fspan>A Rotary social initiative\n        <\u002Fspan>\n        <h1 style=\"font-family:Spectral,serif;font-weight:600;font-size:60px;line-height:1.04;letter-spacing:-0.02em;margin:20px 0 0;color:#23201B;text-wrap:balance;\">Meaningful work for <span style=\"color:#3F6E4B;font-style:italic;\">neurodiverse<\u002Fspan> talent.<\u002Fh1>\n        <p style=\"font-size:19px;line-height:1.6;color:#6E685C;margin:24px 0 0;max-width:56ch;\">WorkAble connects job-ready autistic and neurodiverse adults with employers ready to hire inclusively — with the dignity, clarity, and support that everyone deserves.<\u002Fp>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:32px;\">\n          <button onclick=\"{{ goRegister }}\" style=\"cursor:pointer;font-family:inherit;font-size:16px;font-weight:600;color:#fff;background:#3F6E4B;border:1px solid #345C3F;padding:14px 26px;border-radius:12px;min-height:44px;\" style-hover=\"background:#345C3F;\">Create an account<\u002Fbutton>\n          <button onclick=\"{{ goLogin }}\" style=\"cursor:pointer;font-family:inherit;font-size:16px;font-weight:600;color:#3F6E4B;background:#E9EFE8;border:1px solid #d7e3d5;padding:14px 26px;border-radius:12px;min-height:44px;\" style-hover=\"background:#dfe9dd;\">I already have one<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"background:#FFFDF8;border:1px solid #E7E1D3;border-radius:20px;padding:38px;position:relative;overflow:hidden;\">\n          <div style=\"position:absolute;inset:0;background:radial-gradient(120% 90% at 80% 0%, #f1ece0 0%, transparent 60%);\"><\u002Fdiv>\n          <svg width=\"150\" height=\"150\" viewBox=\"0 0 32 32\" fill=\"none\" style=\"position:relative;display:block;margin:0 auto;\">\n            <path d=\"M5.5 27 H26.5\" stroke=\"#3F6E4B\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M8 27 V16 a8 8 0 0 1 16 0 V27\" stroke=\"#3F6E4B\" stroke-width=\"1.7\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n            <path d=\"M16 9.5 C16.4 13.2 16.8 13.6 20.6 14 C16.8 14.4 16.4 14.8 16 18.6 C15.6 14.8 15.2 14.4 11.4 14 C15.2 13.6 15.6 13.2 16 9.5 Z\" fill=\"#BC6A43\"><\u002Fpath>\n          <\u002Fsvg>\n          <p style=\"position:relative;text-align:center;font-family:Spectral,serif;font-style:italic;font-size:18px;color:#3F6E4B;margin:24px 0 0;line-height:1.5;\">“Everyone deserves a doorway to good work.”<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"max-width:1120px;margin:0 auto;padding:48px 32px 64px;\">\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid #E7E1D3;\">\n        <div style=\"padding:32px 28px 8px 0;border-right:1px solid #E7E1D3;\">\n          <span style=\" \u002Fsc-if>\n\n  <!-- ============ ADMIN TABLE ============ -->\n  <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"Admin\">\n    <header style=\"background:#FFFDF8;border-bottom:1px solid #E7E1D3;position:sticky;top:41px;z-index:20;\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:13px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n        <span style=\"display:inline-flex;align-items:center;gap:9px;\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 32 32\" fill=\"none\"><path d=\"M5.5 27 H26.5\" stroke=\"#3F6E4B\" stroke-width=\"2.4\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M8 27 V16 a8 8 0 0 1 16 0 V27\" stroke=\"#3F6E4B\" stroke-width=\"2.4\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath><path d=\"M16 9.5 C16.4 13.2 16.8 13.6 20.6 14 C16.8 14.4 16.4 14.8 16 18.6 C15.6 14.8 15.2 14.4 11.4 14 C15.2 13.6 15.6 13.2 16 9.5 Z\" fill=\"#BC6A43\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-family:Spectral,serif;font-weight:600;font-size:18px;letter-spacing:-0.01em;\">Work<span style=\"color:#3F6E4B;\">Able<\u002Fspan><\u002Fspan>\n        <\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;color:#6E685C;background:#f1ece0;border:1px solid #E7E1D3;border-radius:999px;padding:5px 11px;\">Rotary Admin<\u002Fspan>\n        <nav style=\"margin-left:auto;display:flex;align-items:center;gap:4px;flex-wrap:wrap;\">\n          <span style=\"font-size:14px;font-weight:600;color:#6E685C;padding:8px 13px;border-radius:9px;\">Overview<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:600;color:#23201B;background:#f1ece0;padding:8px 13px;border-radius:9px;\">Approvals<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:600;color:#6E685C;padding:8px 13px;border-radius:9px;\">Students<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:600;color:#6E685C;padding:8px 13px;border-radius:9px;\">Listings<\u002Fspan>\n        <\u002Fnav>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <main style=\"max-width:1120px;margin:0 auto;padding:32px;\">\n      <h1 style=\"font-family:Spectral,serif;font-weight:600;font-size:34px;margin:0;letter-spacing:-0.015em;\">Accounts &amp; approvals<\u002Fh1>\n      <p style=\"font-size:16px;color:#6E685C;margin:6px 0 24px;\">Approve or reject schools and recruiters.<\u002Fp>\n\n      <div style=\"background:#FFFDF8;border:1px solid #E7E1D3;border-radius:14px;overflow:hidden;\">\n        <sc-for list=\"{{ accounts }}\" as=\"a\" hint-placeholder-count=\"5\">\n            <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:15px;\">\n          <thead>\n            <tr style=\"background:#f4efe5;text-align:left;color:#6E685C;\">\n              <th style=\"padding:14px 20px;font-weight:600;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;\">Name<\u002Fth>\n              <th style=\"padding:14px 20px;font-weight:600;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;\">Email<\u002Fth>\n              <th style=\"padding:14px 20px;font-weight:600;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;\">Role<\u002Fth>\n              <th style=\"padding:14px 20px;font-weight:600;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;\">Status<\u002Fth>\n              <th style=\"padding:14px 20px;font-weight:600;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;\">Action<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr style=\"border-top:1px solid #EFE9DC;\">\n              <td style=\"padding:15px 20px;font-weight:600;color:#23201B;\">{{ a.name }}<\u002Ftd>\n              <td style=\"padding:15px 20px;color:#6E685C;\">{{ a.email }}<\u002Ftd>\n              <td style=\"padding:15px 20px;\"><span style=\"font-size:12px;font-weight:600;color:#6E685C;background:#f1ece0;border-radius:999px;padding:4px 11px;\">{{ a.role }}<\u002Fspan><\u002Ftd>\n              <td style=\"padding:15px 20px;\"><span style=\"{{ a.statusStyle }}\">{{ a.status }}<\u002Fspan><\u002Ftd>\n              <td style=\"padding:15px 20px;\"><div style=\"display:flex;gap:8px;\">\n                <button style=\"cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#3F6E4B;background:#E9EFE8;border:1px solid #d7e3d5;padding:8px 14px;border-radius:9px;min-height:40px;\">Approve<\u002Fbutton>\n                <button style=\"cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#B0524A;background:#F4E6E4;border:1px solid #ecd5d2;padding:8px 14px;border-radius:9px;min-height:40px;\">Reject<\u002Fbutton>\n              <\u002Fdiv><\u002Ftd>\n            <\u002Ftr>\n            \n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { screen: \"landing\", role: \"individual\", basePay: 18000, jobSkills: [\"Packaging\", \"Sorting\"] };\n\n  go(s) { this.setState({ screen: s }); window.scrollTo(0, 0); }\n\n  renderVals() {\n    const screen = this.state.screen;\n    const tabBase = \"cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border:none;padding:6px 12px;border-radius:8px;\";\n    const tabOf = (id) => tabBase + (screen === id\n      ? \"background:#FAF8F3;color:#23201B;\"\n      : \"background:transparent;color:#b8b0a2;\");\n\n    const role = this.state.role;\n    const roleBtnBase = \"cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:13px 6px;border-radius:11px;text-align:center;min-height:46px;\";\n    const roleBtnOf = (id) => roleBtnBase + (role === id\n      ? \"border:1.5px solid #3F6E4B;background:#E9EFE8;color:#3F6E4B;\"\n      : \"border:1px solid #E7E1D3;background:#FAF8F3;color:#6E685C;\");\n    const orgLabel = role === \"school\" ? \"School / Centre name\" : role === \"recruiter\" ? \"Company name\" : \"Your full name\";\n\n    const fmt = (n) => \"₹\" + Math.round(n).toLocaleString(\"en-IN\");\n    const base = Number(this.state.basePay) || 0;\n    const payRange = base > 0 ? fmt(base * 0.7) + \" – \" + fmt(base * 1.3) : \"Enter a base pay to preview\";\n\n    const ALL_SKILLS = [\"Data Entry\", \"Packaging\", \"Sorting\", \"Hospitality\", \"Gardening\", \"Baking\", \"Quality Checking\", \"Assembly Line\"];\n    const sel = this.state.jobSkills;\n    const chipOn = \"cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:9px 15px;border-radius:999px;min-height:42px;border:1.5px solid #3F6E4B;background:#E9EFE8;color:#3F6E4B;\";\n    const chipOff = \"cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;padding:9px 15px;border-radius:999px;min-height:42px;border:1px solid #E7E1D3;background:#FAF8F3;color:#6E685C;\";\n    const jobSkills = ALL_SKILLS.map((name) => ({ name, chipStyle: sel.includes(name) ? chipOn : chipOff }));\n\n    const avatarColors = [[\"#E9EFE8\", \"#3F6E4B\"], [\"#F4E7DC\", \"#BC6A43\"], [\"#eee5d3\", \"#8a7a52\"], [\"#e6e8ef\", \"#5a6587\"]];\n    const av = (i) => {\n      const [bg, fg] = avatarColors[i % avatarColors.length];\n      return `display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;flex-shrink:0;font-weight:700;font-size:15px;background:${bg};color:${fg};`;\n    };\n    const badgeVisible = \"font-size:11px;font-weight:700;color:#3F6E4B;background:#E9EFE8;border:1px solid #d7e3d5;border-radius:999px;padding:4px 10px;white-space:nowrap;\";\n    const badgeHidden = \"font-size:11px;font-weight:700;color:#6E685C;background:#f1ece0;border:1px solid #E7E1D3;border-radius:999px;padding:4px 10px;white-space:nowrap;\";\n\n    const students = [\n      { name: \"Rohan Mehta\", initials: \"RM\", meta: \"21 yrs · Pune\", skills: [\"Data Entry\", \"Quality Checking\", \"Sorting\"], visible: true, i: 0 },\n      { name: \"Priya Nair\", initials: \"PN\", meta: \"19 yrs · Mumbai\", skills: [\"Graphic Design\", \"Photography\"], visible: true, i: 1 },\n      { name: \"Aditya Shah\", initials: \"AS\", meta: \"24 yrs · Nashik\", skills: [\"Packaging\", \"Assembly Line\"], visible: false, i: 2 },\n    ].map((s) => ({\n      ...s, avatar: av(s.i), badge: s.visible ? badgeVisible : badgeHidden,\n      status: s.visible ? \"Visible\" : \"Hidden\", action: s.visible ? \"Hide\" : \"Make visible\",\n    }));\n\n    const candidates = [\n      { name: \"Rohan Mehta\", initials: \"RM\", meta: \"21 yrs · Pune\", bio: \"Detail-oriented and reliable. Thrives with clear routines and checklists.\", skills: [\"Data Entry\", \"Quality Checking\"], i: 0 },\n      { name: \"Priya Nair\", initials: \"PN\", meta: \"19 yrs · Mumbai\", bio: \"Creative eye for layout and colour. Completed a 6-month design course.\", skills: [\"Graphic Design\", \"Photography\"], i: 1 },\n      { name: \"Sara Iqbal\", initials: \"SI\", meta: \"23 yrs · Pune\", bio: \"Warm and dependable in customer-facing roles. Loves a busy café.\", skills: [\"Hospitality\", \"Customer Greeting\"], i: 3 },\n      { name: \"Karan Joshi\", initials: \"KJ\", meta: \"20 yrs · Thane\", bio: \"Methodical with repetitive tasks. Strong stamina, great attendance.\", skills: [\"Packaging\", \"Sorting\"], i: 2 },\n      { name: \"Meera Pillai\", initials: \"MP\", meta: \"22 yrs · Mumbai\", bio: \"Calm and precise. Enjoys structured, hands-on work in the kitchen.\", skills: [\"Baking\", \"Housekeeping\"], i: 0 },\n      { name: \"Dev Anand\", initials: \"DA\", meta: \"25 yrs · Pune\", bio: \"Comfortable with computers and data. Quietly thorough and accurate.\", skills: [\"Computer Operations\", \"Tally / Accounting\"], i: 1 },\n    ].map((c) => ({ ...c, avatar: av(c.i) }));\n\n    const stApproved = \"font-size:12px;font-weight:700;color:#3F6E4B;background:#E9EFE8;border:1px solid #d7e3d5;border-radius:999px;padding:4px 11px;\";\n    const stPending = \"font-size:12px;font-weight:700;color:#BC6A43;background:#F4E7DC;border:1px solid #ecdcc9;border-radius:999px;padding:4px 11px;\";\n    const stRejected = \"font-size:12px;font-weight:700;color:#B0524A;background:#F4E6E4;border:1px solid #ecd5d2;border-radius:999px;padding:4px 11px;\";\n    const accounts = [\n      { name: \"Greenwood Training Centre\", email: \"hello@greenwood.org\", role: \"school\", status: \"pending\" },\n      { name: \"Brightpath Logistics\", email: \"talent@brightpath.in\", role: \"recruiter\", status: \"approved\" },\n      { name: \"Saksham Skills Hub\", email: \"admin@saksham.in\", role: \"school\", status: \"approved\" },\n      { name: \"Nova Hospitality Group\", email: \"careers@novahg.com\", role: \"recruiter\", status: \"pending\" },\n      { name: \"Quick Mart Pvt Ltd\", email: \"hr@quickmart.in\", role: \"recruiter\", status: \"rejected\" },\n    ].map((a) => ({ ...a, statusStyle: a.status === \"approved\" ? stApproved : a.status === \"pending\" ? stPending : stRejected }));\n\n    return {\n      isLanding: screen === \"landing\", isLogin: screen === \"login\", isRegister: screen === \"register\",\n      isSchool: screen === \"school\", isRecruiter: screen === \"recruiter\", isJob: screen === \"job\", isAdmin: screen === \"admin\",\n      goLanding: () => this.go(\"landing\"), goLogin: () => this.go(\"login\"), goRegister: () => this.go(\"register\"),\n      goSchool: () => this.go(\"school\"), goRecruiter: () => this.go(\"recruiter\"), goJob: () => this.go(\"job\"), goAdmin: () => this.go(\"admin\"),\n      tab: { landing: tabOf(\"landing\"), login: tabOf(\"login\"), register: tabOf(\"register\"), school: tabOf(\"school\"), recruiter: tabOf(\"recruiter\"), job: tabOf(\"job\"), admin: tabOf(\"admin\") },\n      roleBtn: { individual: roleBtnOf(\"individual\"), school: roleBtnOf(\"school\"), recruiter: roleBtnOf(\"recruiter\") },\n      pickIndividual: () => this.setState({ role: \"individual\" }), pickSchool: () => this.setState({ role: \"school\" }), pickRecruiter: () => this.setState({ role: \"recruiter\" }),\n      orgLabel,\n      basePay: this.state.basePay, payRange, onPay: (e) => this.setState({ basePay: e.target.value }),\n      jobSkills, toggleSkill: (e) => { const s = e.currentTarget.getAttribute(\"data-skill\"); this.setState((st) => ({ jobSkills: st.jobSkills.includes(s) ? st.jobSkills.filter((x) => x !== s) : [...st.jobSkills, s] })); },\n      students, candidates, accounts,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
